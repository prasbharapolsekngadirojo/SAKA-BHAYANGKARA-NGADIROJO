.hero{

linear-gradient(rgba(120,0,0,.85),

}

.gallery{
padding:50px 8%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:280px;
object-fit:cover;
border-radius:20px;
transition:.4s;
cursor:pointer;
border:2px solid transparent;
}

.gallery img:hover{
transform:scale(1.05);
border-color:#ffd700;

}

.back{
display:block;
width:max-content;
margin:20px auto 50px;
padding:15px 35px;
background:#ffd700;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:50px;
}

.back:hover{
box-shadow:0 0 20px #ffd700;
}

footer{
background:#111;
padding:30px;
text-align:center;
border-top:2px solid #ffd700;
}

.rondom-container{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:40px auto;
}

.rondom-card{
width:250px;
background:#181818;
border-radius:25px;
padding:15px;
text-align:center;
text-decoration:none;
transition:.3s;
display:block;
margin:0;
}

.rondom-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
}

.rondom-card h3{
color:#ffd700;
margin-top:15px;
}

.rondom-card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px rgba(255,215,0,.5);
}
